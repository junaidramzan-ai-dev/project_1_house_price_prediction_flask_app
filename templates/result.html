{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg text-center">

        <div class="card-header bg-success text-white">

            <h2>Prediction Result</h2>

        </div>

        <div class="card-body">

            <h5 class="text-muted">

                Estimated House Price

            </h5>

            <h1 class="display-4 text-success fw-bold">

                PKR {{ predicted_price }}

            </h1>

            <p class="mt-3">

                This prediction is generated using a trained
                <strong>Multiple Linear Regression Pipeline</strong>.

            </p>

            <a href="{{ url_for('predict') }}"
               class="btn btn-primary btn-lg mt-3">

                Predict Another House

            </a>

        </div>

    </div>

</div>

{% endblock %}
